<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Basic Page Information -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Last updated: 2026-07-16 – minor improvements and notes added -->

    <!-- Page Title -->
    <title>Play Chess – Two-Player Board</title>

    <!-- External CSS File -->
    <link rel="stylesheet" href="styles.css">

    <!-- Internal CSS -->
    <style>

        /* General Page Styling */
        body {
            font-family: Arial, sans-serif;
        }

        /* Navigation Bar */
        .navbar {
            background-color: #333;
            padding: 10px 20px;
        }

        /* Navigation List */
        .navbar-list {
            list-style: none;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* Website Logo / Brand */
        .navbar-brand {
            text-decoration: none;
            font-weight: bold;
            font-size: 2rem;
            color: #e8ad4eb3;
            margin-right: auto;
        }

        /* Navigation Links */
        .navbar-link {
            text-decoration: none;
            color: white;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        /* Navigation Link Hover Effect */
        .navbar-link:hover {
            color: #f39c12;
        }

        /* Login & Signup Buttons */
        .navbar-btn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s ease;
        }

        /* Button Hover Effect */
        .navbar-btn:hover {
            background-color: #45a049;
        }

        /* Game Information Section */
        .game-info {
            text-align: center;
            color: white;
            margin: 10px 0;
            font-size: 18px;
        }

        /* Turn Indicator – highlights whose turn it is */
        .game-info span {
            font-weight: bold;
            color: #f39c12;
        }

    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <ul class="navbar-list">
            <li><a href="index.html" class="navbar-brand">Chess Game</a></li>
            <li><a href="about.html" class="navbar-link">About</a></li>
            <li><a href="contact.html" class="navbar-link">Contact</a></li>
            <li><a href="login.html" class="navbar-btn">Login</a></li>
            <li><a href="signup.html" class="navbar-btn">Sign up</a></li>
        </ul>
    </nav>

    <!-- Display Current Player's Turn – updated dynamically by chess.js -->
    <div class="game-info">
        Current turn: <span id="turn-indicator">White</span>
    </div>

    <!-- Chessboard Container – squares are rendered by chess.js -->
    <div class="chessboard">
        <!-- Chessboard squares are generated dynamically by chess.js -->
    </div>

    <!-- External JavaScript File – contains all game logic and rendering -->
    <script src="chess.js"></script>

    <!-- Small developer note (visible only in source) -->
    <!-- For debugging, open the browser console (F12) to see move logs. -->

</body>
</html>
