<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Ensures proper scaling across different screen sizes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Added a description for better SEO / context -->
    <meta name="description" content="Contact the Chess Game team – your messages are stored locally in your browser.">
    <title>Contact - Chess Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
        }

        /* Top navigation bar */
        .navbar {
            background-color: #333;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }

        .navbar a:hover {
            color: #f39c12;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e8ad4e !important;
        }

        /* Main contact form container */
        .contact-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .contact-container h2 {
            color: #007BFF;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Form labels */
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        /* Shared styling for form fields */
        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Primary action button */
        button {
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Success notification displayed after form submission */
        .success-message {
            display: none;
            background-color: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Footer section */
        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <!-- Website navigation -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">Chess Game</a>
        <div>
            <a href="chess.html">Play</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Sign up</a>
        </div>
    </nav>

    <!-- Contact form section -->
    <div class="contact-container">
        <h2>Contact Us</h2>

        <div id="success-message" class="success-message">
            Thank you! Your message has been received.
        </div>

        <form id="contact-form">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Your email" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Your message" required></textarea>

            <button type="submit">Send Message</button>
        </form>
        <!-- Short note about data storage -->
        <p style="text-align: center; font-size: 0.9em; color: #666; margin-top: 15px;">
            💾 Your message is saved locally in your browser (localStorage).
        </p>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <!-- Updated year to 2026 -->
        <p>&copy; 2026 Chess Game. All rights reserved.</p>
    </footer>

    <script>
        /**
         * Contact form handler – stores messages in browser's localStorage.
         * This is a demo implementation; no data is sent to any server.
         * Updated: 2026-07-16
         */
        document.getElementById('contact-form').addEventListener('submit', function (e) {
            e.preventDefault();

            // Retrieve previously saved messages (if available)
            const messages = JSON.parse(localStorage.getItem('contactMessages') || '[]');

            // Store the latest contact form submission
            messages.push({
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value,
                date: new Date().toISOString()
            });

            // Update local storage with the new message
            localStorage.setItem('contactMessages', JSON.stringify(messages));

            // Display confirmation and reset the form
            document.getElementById('success-message').style.display = 'block';
            this.reset();

            // Optional: auto-hide the success message after 5 seconds
            setTimeout(() => {
                document.getElementById('success-message').style.display = 'none';
            }, 5000);
        });
    </script>
</body>
</html>
