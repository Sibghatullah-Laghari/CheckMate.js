<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Configure responsive scaling for different devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Chess Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Simple navigation links */
        .nav-links {
            margin-bottom: 20px;
        }

        .nav-links a {
            color: #007BFF;
            text-decoration: none;
            margin: 0 10px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        /* Sign up form container */
        .signup-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 320px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        /* Shared styling for input fields */
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }

        /* Primary submit button */
        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Message area for success or error notifications */
        .message {
            display: none;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .login-link {
            margin-top: 15px;
            font-size: 14px;
        }

        .login-link a {
            color: #007BFF;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <!-- Basic page navigation -->
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="chess.html">Play</a>
        <a href="login.html">Login</a>
    </div>

    <!-- User registration form -->
    <div class="signup-container">
        <h2>Sign Up</h2>

        <div id="message" class="message"></div>

        <form id="signup-form">
            <input type="text" id="firstName" name="firstName" placeholder="First Name" required>
            <input type="text" id="lastName" name="lastName" placeholder="Last Name" required>
            <input type="email" id="email" name="email" placeholder="Email" required>
            <input type="password" id="password" name="password" placeholder="Password" required minlength="6">

            <button type="submit">Sign up</button>
        </form>

        <p class="login-link">
            Already have an account? <a href="login.html">Login</a>
        </p>
    </div>

    <script src="auth.js"></script>
    <script>
        // Handle user registration
        document.getElementById('signup-form').addEventListener('submit', function (e) {
            e.preventDefault();

            // Register the user using the authentication helper
            const result = registerUser({
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value
            });

            // Display the appropriate message based on the registration result
            if (result.success) {
                showMessage('message', result.message + ' Redirecting to login...', false);

                // Redirect after a short delay
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } else {
                showMessage('message', result.message, true);
            }
        });
    </script>
</body>
</html>
